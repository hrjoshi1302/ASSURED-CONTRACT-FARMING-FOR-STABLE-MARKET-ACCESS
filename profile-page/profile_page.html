<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <!-- Profile Details Section -->
        <div class="profile-section">
            <center>
                <h1>Profile</h1>
                <div class="profile-details">
                    <img src="buyersphoto.jpg" class="profile-pic">
                    <div class="profile-info">
<h2 id="profileName">User Name</h2>
<p>Email: <span id="profileEmail"></span></p>
<p>Phone: <span id="profilePhone">+91 5473597359</span></p> 
                        <a href="editprofile.html">
                            <button class="Edit-profile-btn">Edit Profile</button>
                        </a>
                    </div>
                </div>
        </div>

        <!-- Order History Section -->
        <div class="order-history-section">
            <h2 style="text-align:left;">Order History</h2>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>date</th>
                        <th>product name</th>
                        <th>contract </th>
                        <th>price</th>
                        <th>status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>--</td>
                        <td>--</td>
                        <td>--</td>
                        <td>--</td>
                        <td>--</td>
                        <td>--</td>
                    </tr>

                    <!-- More orders -->
                </tbody>
            </table>
        </div>

        <!-- Saved Products or Wishlist Section -->
        <div class="wishlist-section">
            <h2 style="text-align:left;">Saved Products</h2>
            <div class="products-grid">
                <div class="product">
                    <img src="image" alt="Product 1">
                    <p>Product Name 1</p>
                </div>
                <div class="product">
                    <img src="image" alt="Product 2">
                    <p>Product Name 2</p>
                </div>
                <!-- More saved products -->
            </div>
            <a href="productadd.html"><button class="add-product-btn">Add New Product</button></a>
        </div>  

        <!-- Notifications Section -->
        <div class="notifications-section">
            <h2 style="text-align:left;">Notifications</h2>
            <ul>
                <li>Your order has been shipped.</li>
                <li>Your order has been delivered.</li>
                <!-- More notifications -->
            </ul>
        </div>

        <!-- Payment Methods Section -->
        <div class="payment-methods-section">
            <a href="add-payment.html"><button class="payment-btn">Payment Methods</button></a>

        </div>

        <!-- Address Book Section -->
        <div class="address-book-section">
            <h2 style="text-align:left;">Address Book</h2>
            <a href="address.html">
                <button class="Edit-address-btn">Edit Address</button>
            </a>
        </div>

        <!-- Account Settings Section -->
        <div class="account-settings-section">
            <h2 style="text-align:left;">Account Settings</h2>
            <a href="password.html">
                <button class="change-password-btn">Change Password</button>
            </a>
        </div>
    </div>
    </center>
</body>

</html>
