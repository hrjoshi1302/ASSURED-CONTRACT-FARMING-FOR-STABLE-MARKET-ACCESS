	<script type="text/javascript">
		function googleTranslateElementInit() {
			new google.translate.TranslateElement({
				pageLanguage: 'en',
				includedLanguages: 'en,hi,as,bn,kn,gu,ml,mr,or,pa,ta,te,ur,mni,ks,doi',
				layout: google.translate.TranslateElement.InlineLayout.SIMPLE

		}

	<style>
		.breadcrumb {
			display: flex;
			list-style: none;
			background-color: #f8f9fa;
			padding: 30px;
			position: fixed;
			/* Make the navigation fixed */
			top: 0;
			/* Stick it to the top */
			left: 0;
			width: 100%;
			/* Full width of the page */
			z-index: 1000;
			/* Ensure it's on top of other elements */
			margin-top: 0;
			/* Adjust if needed */
			margin-left: 0;
			/* Adjust to start from the left edge */
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
			/* Optional: add a subtle shadow */
			font-family: Georgia, 'Times New Roman', Times, serif;
		}

		.breadcrumb-item {
			margin-left: 70px;
			margin-top: 1.18%;
		}

		.breadcrumb-item a {
			text-decoration: none;
			color: #9b9b9b;
		}

		.breadcrumb-item a:hover {
			color: #000000;
			transition: all 0.6s;
		}

		.search-form {
			display: flex;
			align-items: center;
			margin-left: 70px;
		}

		.search-input {
			border: 1px solid #ced4da;
			border-radius: 20px;
			padding: 10px 15px;
			width: 300px;
			/* Adjust width as needed */
			font-size: 16px;
			transition: border-color 0.3s ease;
			margin-right: 60px;
		}

		.search-input:focus {
			border-color: #80bdff;
			outline: none;
		}

		.search-icon {
			border: none;
			background: none;
			padding: 10px;
			margin-left: -49px;
			/* Adjust this value based on the size of the icon and the padding */
			cursor: pointer;
		}

		.search-icon i {
			font-size: 20px;
			/* Adjust size of the icon */
			color: #007bff;
			/* Color of the icon */
		}

		.search-icon:hover i {
			color: #ffffff;
			/* Darker shade on hover */
		}
	</style>
</head>

	<script>
		function updateBreadcrumb(categoryName) {
			const breadcrumb = document.querySelector('.breadcrumb-item.active');
			breadcrumb.textContent = categoryName;
		}

		// Call this function when a user clicks on a category
		// Example:
		// updateBreadcrumb('Maize (Corn)');


		// Update breadcrumb when clicking on a category link
		categoryList.querySelectorAll('.category a').forEach((link) => {
			link.addEventListener('click', (e) => {
				e.preventDefault();
				const categoryName = cerealSet.name; // This gets the current cereal category name
				updateBreadcrumb(categoryName);
				// Optionally, you could navigate to a different page or load new content here
			});
		});
